name: Build iOS Tweak (HTML)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        brew install make
        brew install ldid

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin:$PATH" >> $GITHUB_PATH

    - name: Setup iOS SDK
      run: |
        rm -rf $HOME/theos/sdks
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        export ARCHS=arm64
        export TARGET=iphone:clang:latest:16.5
        make package FINALPACKAGE=1

    - name: Find and Upload .deb
      run: |
        find . -name "*.deb" -print
      continue-on-error: true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NexoraHTML-Tweak
        path: |
          packages/*.deb
          *.deb
          .theos/*.deb
          **/*.deb
        if-no-files-found: warn
